<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實驗 9.10：長期酸雨生態模擬 | Ecology Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --soil-height: 100px;
        }
        .simulation-area {
            position: relative;
            height: 480px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
            border-radius: 0.75rem;
            transition: background 1s ease;
        }
        
        /* 泥土層 */
        .soil {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: var(--soil-height);
            background: linear-gradient(to bottom, #6d4c41 0%, #3e2723 100%);
            z-index: 10;
            overflow: hidden;
        }

        /* 礦物質粒子 */
        .mineral-particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: #fde047;
            border-radius: 50%;
            box-shadow: 0 0 4px #fef08a;
            transition: transform 1s ease, opacity 1s ease;
        }
        .mineral-particle.leached {
            opacity: 0;
            transform: translateY(60px);
        }

        /* 植物容器 */
        #plantContainer {
            position: absolute;
            bottom: calc(var(--soil-height) - 2px);
            width: 100%;
            height: 350px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            z-index: 20;
            padding: 0 30px;
        }

        .plant {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .stem {
            width: 8px;
            background-color: #4ade80;
            border-radius: 4px;
            transition: height 0.3s ease, background-color 0.8s ease;
            position: relative;
            transform-origin: bottom center;
            height: 50px; /* 初始高度 */
        }

        .leaf {
            position: absolute;
            background-color: #4ade80;
            border-radius: 50% 0 50% 0;
            transition: all 0.5s ease;
            opacity: 0;
            transform: scale(0);
        }
        
        .leaf.visible {
            opacity: 1;
            transform: scale(1);
        }

        .leaf.left { right: 6px; transform-origin: right center; border-radius: 0 50% 0 50%; }
        .leaf.right { left: 6px; transform-origin: left center; }
        
        .leaf.fallen {
            opacity: 0 !important;
            transform: translateY(150px) rotate(90deg) scale(0.5) !important;
        }

        /* 雨點 */
        .raindrop {
            position: absolute;
            width: 1.5px;
            height: 15px;
            background-color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            z-index: 40;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-30px); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(480px); opacity: 0; }
        }

        input[type=range].ph-slider::-webkit-slider-runnable-track {
            background: linear-gradient(to right, #ef4444 0%, #f97316 30%, #eab308 50%, #22c55e 100%);
        }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans text-slate-800">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        
        <header class="bg-indigo-900 text-white p-6">
            <h1 class="text-2xl md:text-3xl font-bold">實驗 9.10：長期酸雨生態模擬</h1>
            <p class="text-indigo-300 text-sm mt-1 uppercase">Dynamic Plant Growth & Soil Leaching Analysis</p>
        </header>

        <div class="flex flex-col lg:flex-row">
            
            <!-- 控制面板 -->
            <div class="w-full lg:w-80 p-6 bg-slate-50 border-r border-slate-200 space-y-6">
                
                <div>
                    <label class="block text-xs font-black text-slate-500 mb-3 uppercase">觀察模式</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="modeSingle" class="py-2 px-3 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold text-sm">單一植株</button>
                        <button id="modeForest" class="py-2 px-3 rounded-lg border-2 border-transparent bg-white text-slate-600 font-bold text-sm shadow-sm hover:border-slate-300">森林群落</button>
                    </div>
                </div>

                <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-sm font-bold text-slate-700">雨水 pH 值</label>
                        <span id="phVal" class="text-xl font-mono font-black text-indigo-600">5.6</span>
                    </div>
                    <input type="range" id="phInput" min="3.0" max="7.0" step="0.1" value="5.6" class="w-full h-2 rounded-lg appearance-none cursor-pointer ph-slider">
                </div>

                <div class="p-4 bg-white rounded-xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-sm font-bold text-slate-700">模擬跨度 (天)</label>
                        <span id="dayVal" class="text-xl font-mono font-black text-indigo-600">0</span>
                    </div>
                    <input type="range" id="dayInput" min="0" max="365" step="1" value="0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="space-y-2">
                    <button id="playBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-black transition-all shadow-[0_4px_0_0_#3730a3] active:shadow-none active:translate-y-1">
                        開始時間加速模擬
                    </button>
                    <button id="resetBtn" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 py-3 rounded-xl font-bold">重設環境</button>
                </div>
            </div>

            <!-- 視覺顯示區 -->
            <div class="flex-1 relative bg-slate-50 flex flex-col">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 p-4 z-30">
                    <div class="bg-white/90 p-3 rounded-xl shadow-sm border border-slate-200">
                        <p class="text-[10px] uppercase text-slate-400 font-black">平均高度</p>
                        <p id="statHeight" class="text-lg font-mono font-black">5.0 cm</p>
                    </div>
                    <div class="bg-white/90 p-3 rounded-xl shadow-sm border border-slate-200">
                        <p class="text-[10px] uppercase text-slate-400 font-black">土壤養分</p>
                        <p id="statMineral" class="text-lg font-mono font-black text-amber-500">100%</p>
                    </div>
                    <div class="bg-white/90 p-3 rounded-xl shadow-sm border border-slate-200">
                        <p class="text-[10px] uppercase text-slate-400 font-black">健康狀態</p>
                        <div id="statHealth" class="text-sm font-black mt-1 text-green-600">茂盛</div>
                    </div>
                    <div class="bg-white/90 p-3 rounded-xl shadow-sm border border-slate-200">
                        <p class="text-[10px] uppercase text-slate-400 font-black">土壤環境</p>
                        <div id="statImpact" class="text-[11px] font-bold mt-1 text-slate-600">正常</div>
                    </div>
                </div>

                <div class="simulation-area mx-4 mb-4 shadow-inner border border-slate-200">
                    <div id="rainLayer" class="absolute inset-0 z-40"></div>
                    <div id="plantContainer"></div>
                    <div id="soilLayer" class="soil"></div>
                </div>

                <div class="px-4 pb-6 mt-auto">
                    <div class="bg-white rounded-xl p-5 border border-slate-200 shadow-sm relative">
                        <div class="absolute top-0 left-0 w-1 h-full bg-indigo-600"></div>
                        <h3 class="font-black text-slate-800 mb-1 flex items-center gap-2">
                            <span id="conclusionIcon">🌿</span>
                            觀察報告
                        </h3>
                        <p id="observationText" class="text-sm text-slate-600 leading-relaxed font-medium">
                            環境穩定。請調整滑桿開始模擬酸雨影響。
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            single: { count: 1, stemWidth: 16, leafSize: 40, leafInterval: 25 },
            forest: { count: 10, stemWidth: 8, leafSize: 20, leafInterval: 15 }
        };

        let currentMode = 'single';
        let isPlaying = false;
        let playInterval;
        let mineralParticles = [];

        const phInput = document.getElementById('phInput');
        const dayInput = document.getElementById('dayInput');
        const plantContainer = document.getElementById('plantContainer');
        const soilLayer = document.getElementById('soilLayer');
        const rainLayer = document.getElementById('rainLayer');
        const statHeight = document.getElementById('statHeight');
        const statMineral = document.getElementById('statMineral');
        const statHealth = document.getElementById('statHealth');
        const statImpact = document.getElementById('statImpact');
        const observationText = document.getElementById('observationText');

        function initMinerals() {
            soilLayer.innerHTML = '';
            mineralParticles = [];
            const count = currentMode === 'single' ? 60 : 120;
            for(let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'mineral-particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 80 + '%';
                soilLayer.appendChild(p);
                mineralParticles.push(p);
            }
        }

        function createPlants() {
            plantContainer.innerHTML = '';
            const c = config[currentMode];
            for(let i = 0; i < c.count; i++) {
                const p = document.createElement('div');
                p.className = 'plant';
                
                const stem = document.createElement('div');
                stem.className = 'stem';
                stem.style.width = c.stemWidth + 'px';
                
                // 預建葉子，但不顯示，並設定它們的基礎位置
                for(let l = 0; l < 15; l++) {
                    const leaf = document.createElement('div');
                    leaf.className = `leaf ${l % 2 === 0 ? 'left' : 'right'}`;
                    const bottomPos = (l * c.leafInterval + 15);
                    leaf.style.bottom = bottomPos + 'px';
                    leaf.style.width = c.leafSize + 'px';
                    leaf.style.height = (c.leafSize / 2) + 'px';
                    leaf.dataset.spawnHeight = bottomPos; // 存儲長出所需的最小高度
                    stem.appendChild(leaf);
                }

                p.appendChild(stem);
                plantContainer.appendChild(p);
            }
        }

        function updateSimulation() {
            const ph = parseFloat(phInput.value);
            const days = parseInt(dayInput.value);
            document.getElementById('phVal').textContent = ph.toFixed(1);
            document.getElementById('dayVal').textContent = days;

            // 1. 養分流失計算
            const lossRate = ph < 5.6 ? (5.6 - ph) * 0.15 : 0;
            const mineralPercent = Math.max(0, 100 - (lossRate * days));
            statMineral.textContent = Math.round(mineralPercent) + '%';
            
            const visibleCount = Math.floor((mineralPercent / 100) * mineralParticles.length);
            mineralParticles.forEach((p, i) => {
                if(i >= visibleCount) p.classList.add('leached');
                else p.classList.remove('leached');
            });

            // 2. 生長邏輯
            let avgH = 5.0; // 初始 5cm
            for(let d = 1; d <= days; d++) {
                const currentM = Math.max(0, 100 - (lossRate * d));
                if(currentM > 60) avgH += 0.06;
                else if(currentM > 25) avgH += 0.015;
                else avgH -= 0.02; // 枯萎縮短
            }
            avgH = Math.max(2.0, avgH);
            statHeight.textContent = avgH.toFixed(1) + ' cm';

            // 3. 視覺更新
            const stems = document.querySelectorAll('.stem');
            const visualHeight = avgH * 10; // 1cm = 10px

            stems.forEach(s => {
                s.style.height = visualHeight + 'px';
                
                // 變色邏輯
                if(mineralPercent > 70) s.style.backgroundColor = '#4ade80';
                else if(mineralPercent > 30) s.style.backgroundColor = '#a3e635';
                else s.style.backgroundColor = '#713f12';

                const leaves = s.querySelectorAll('.leaf');
                leaves.forEach((l, idx) => {
                    const spawnHeight = parseFloat(l.dataset.spawnHeight);
                    
                    // 核心修正：只有當莖部長過葉子預定位置時，葉子才「長出」
                    if (visualHeight >= spawnHeight) {
                        l.classList.add('visible');
                        
                        // 根據養分決定狀態
                        if(mineralPercent > 70) {
                            l.style.backgroundColor = '#4ade80';
                            l.classList.remove('fallen');
                            l.style.transform = `rotate(${idx % 2 === 0 ? '-15deg' : '15deg'}) scale(1)`;
                        } else if(mineralPercent > 30) {
                            l.style.backgroundColor = '#facc15';
                            l.classList.remove('fallen');
                            l.style.transform = `rotate(${idx % 2 === 0 ? '-40deg' : '40deg'}) scale(0.9)`;
                        } else {
                            l.style.backgroundColor = '#451a03';
                            if(mineralPercent < 15 && idx > 2) l.classList.add('fallen');
                        }
                    } else {
                        // 莖部還沒長到這裡，葉子隱藏
                        l.classList.remove('visible');
                    }
                });
            });

            // 4. 反饋更新
            updateUI(ph, days, mineralPercent, avgH);
        }

        function updateUI(ph, days, mineralPercent, avgH) {
            let hText, hClass, iText, obs, icon;
            if(mineralPercent > 80) {
                hText = "茂盛"; hClass = "text-green-600"; iText = "平衡"; icon = "🌿";
                obs = `pH ${ph} 環境下，養分充足。${days} 天後植物生長良好，高度 ${avgH.toFixed(1)}cm。`;
            } else if(mineralPercent > 40) {
                hText = "受壓"; hClass = "text-yellow-600"; iText = "淋洗中"; icon = "⚠️";
                obs = `酸雨導致養分流失。葉子開始變黃，生長速度減慢。這是典型的「營養缺乏症」。`;
            } else {
                hText = "崩潰"; hClass = "text-red-600"; iText = "土地貧瘠"; icon = "💀";
                obs = `長期酸雨 (${days} 天) 毀滅了生態系統。土壤中鋁離子可能已達毒性水平，植物正在枯死。`;
            }
            statHealth.textContent = hText;
            statHealth.className = `text-sm font-black mt-1 ${hClass}`;
            statImpact.textContent = iText;
            observationText.innerHTML = obs;
            document.getElementById('conclusionIcon').textContent = icon;
        }

        function spawnRain() {
            rainLayer.innerHTML = '';
            const ph = parseFloat(phInput.value);
            if(ph >= 5.6 && !isPlaying) return;
            const count = ph < 4.5 ? 80 : 40;
            for(let i=0; i<count; i++) {
                const d = document.createElement('div');
                d.className = 'raindrop';
                d.style.left = Math.random() * 100 + '%';
                d.style.animationDuration = (0.4 + Math.random() * 0.4) + 's';
                d.style.animationDelay = Math.random() * 1 + 's';
                rainLayer.appendChild(d);
            }
        }

        document.getElementById('modeSingle').onclick = () => { currentMode = 'single'; toggleBtns('modeSingle', 'modeForest'); resetSimulation(); };
        document.getElementById('modeForest').onclick = () => { currentMode = 'forest'; toggleBtns('modeForest', 'modeSingle'); resetSimulation(); };

        function toggleBtns(on, off) {
            document.getElementById(on).className = "py-2 px-3 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-bold text-sm shadow-sm";
            document.getElementById(off).className = "py-2 px-3 rounded-lg border-2 border-transparent bg-white text-slate-600 font-bold text-sm shadow-sm hover:border-slate-300";
        }

        function resetSimulation() {
            isPlaying = false;
            clearInterval(playInterval);
            dayInput.value = 0;
            document.getElementById('playBtn').textContent = "開始時間加速模擬";
            createPlants();
            initMinerals();
            updateSimulation();
            rainLayer.innerHTML = '';
        }

        document.getElementById('playBtn').onclick = () => {
            if(isPlaying) {
                clearInterval(playInterval);
                document.getElementById('playBtn').textContent = "繼續模擬";
                isPlaying = false;
            } else {
                if(dayInput.value == 365) dayInput.value = 0;
                document.getElementById('playBtn').textContent = "暫停";
                isPlaying = true;
                spawnRain();
                playInterval = setInterval(() => {
                    let d = parseInt(dayInput.value);
                    if(d < 365) { dayInput.value = d + 1; updateSimulation(); }
                    else { clearInterval(playInterval); isPlaying = false; document.getElementById('playBtn').textContent = "重新播放"; }
                }, 40);
            }
        };

        document.getElementById('resetBtn').onclick = resetSimulation;
        phInput.oninput = () => { updateSimulation(); if(isPlaying) spawnRain(); };
        dayInput.oninput = updateSimulation;

        resetSimulation();
    </script>
</body>
</html>
